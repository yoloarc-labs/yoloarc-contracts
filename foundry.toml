[profile.default]
evm_version="prague"
src = "src"
out = "out"
libs = ["lib"]

# 启用优化器和 via-ir 编译模式（解决 Stack too deep 错误）
optimizer = true
optimizer_runs = 200
via_ir = true

fs_permissions = [{ access = "read-write", path = "./" }]

# Fork 测试网络配置 (固定 URL, 禁 ${} 环境变量). 参考样板 /Users/a/Downloads/foundry/foundry.toml
[rpc_endpoints]
bsc_mainnet = "https://bsc-dataseed.binance.org"
bsc_testnet = "https://data-seed-prebsc-2-s1.binance.org:8545"

[lint]
lint_on_build = false
severity = [
    'high',
    'med',
    'low',
    # 'info', 'gas', 'codesize'
]
ignore = [
    '**/script/**/*',
    '**/test/**/*',
    "**/lib/**/*",
    # "**/src/**/*",
]
exclude_lints = [
    "unaliased-plain-import",
    # "memory-safe-assembly"
]
